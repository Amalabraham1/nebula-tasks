<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nebula Tasks</title>

<link rel="stylesheet" href="styles.css">
</head>

<body class="landing">

<div class="welcome-card">

<div class="logo-wrap">
<div class="logo-icon">🌌</div>

<div class="landing-text">
<h1>Nebula Tasks</h1>

<p>
Bend the day into orbit.
Organize tasks, habits and missions
in your own productivity galaxy.
</p>
</div>
</div>

<div id="loggedOutButtons" class="hero-actions">

<div class="hero-actions">

<a href="/login" class="hero-btn">
👤 Login
</a>

<a href="/login?mode=signup" class="hero-btn">
🚀 Sign Up
</a>

</div>



<div id="loggedInButtons"
class="hero-actions"
style="display:none;">

<a href="/dashboard" class="hero-btn">
🚀 Enter Dashboard
</a>

<button
class="hero-btn"
onclick="logout()">

🚪 Logout

</button>

</div>

</div>


<script>

async function checkLogin(){

try{

const res=
await fetch("/api/me");

const data=
await res.json();

if(data.loggedIn){

document.getElementById(
"loggedOutButtons"
).style.display="none";

document.getElementById(
"loggedInButtons"
).style.display="flex";

}

}catch(err){

console.log(err);

}

}


async function logout(){

await fetch("/api/logout",{
method:"POST"
});

window.location="/logout-page";

}

checkLogin();

</script>

</body>
</html>
